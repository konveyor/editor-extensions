name: "Setup Llemulator (Standalone)"
description: "Sets up llemulator for testing without Kubernetes (Linux via Docker, Windows via Go binary)"
inputs:
  port:
    description: "Port to expose llemulator on"
    required: false
    default: "8089"
outputs:
  llemulator_url:
    description: "URL where llemulator is accessible"
    value: ${{ steps.set_llemulator_output.outputs.url }}
runs:
  using: "composite"
  steps:
    # ── Linux: build and run as a Docker container ──────────────────────────
    - name: Clone and build llemulator (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "=== Cloning llemulator repository ==="
        git clone --depth 1 https://github.com/fabianvf/llemulator.git /tmp/llemulator

        echo "=== Building llemulator Docker image ==="
        cd /tmp/llemulator
        docker build -t llemulator:local .

    - name: Start llemulator container (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "=== Starting llemulator container ==="

        docker run -d \
          --name llemulator \
          -p ${{ inputs.port }}:8080 \
          llemulator:local

        LLEMULATOR_URL="http://localhost:${{ inputs.port }}/v1"
        echo "LLEMULATOR_URL=${LLEMULATOR_URL}" >> $GITHUB_ENV

        echo "Llemulator container started on ${LLEMULATOR_URL}"

    - name: Wait for llemulator to be ready (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "=== Waiting for llemulator to be ready ==="
        for i in {1..30}; do
          if curl -s http://localhost:${{ inputs.port }}/healthz > /dev/null 2>&1; then
            echo "Llemulator is ready"
            break
          fi
          echo "Waiting for llemulator... ($i/30)"
          sleep 2
        done

        # Verify it's responding
        if ! curl -s http://localhost:${{ inputs.port }}/healthz > /dev/null 2>&1; then
          echo "ERROR: Llemulator failed to start"
          docker logs llemulator
          exit 1
        fi

    # ── Windows: build as a native Go binary and run as a background process ─
    - name: Clone and build llemulator (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "=== Cloning llemulator repository ==="
        $llemulatorDir = "$Env:RUNNER_TEMP\llemulator"
        if (Test-Path $llemulatorDir) { Remove-Item -Recurse -Force $llemulatorDir }
        git clone --depth 1 https://github.com/fabianvf/llemulator.git $llemulatorDir

        Write-Host "=== Building llemulator Go binary ==="
        Set-Location $llemulatorDir
        go build -o llemulator.exe ./cmd/openai-emulator/
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to build llemulator"
          exit 1
        }
        Write-Host "llemulator.exe built at $llemulatorDir\llemulator.exe"
        echo "LLEMULATOR_DIR=$llemulatorDir" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

    - name: Start llemulator process (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "=== Starting llemulator process ==="
        $llemulatorDir = $Env:LLEMULATOR_DIR
        $llemulatorExe = Join-Path $llemulatorDir "llemulator.exe"

        # llemulator reads the port from the PORT environment variable; set it before spawning
        $env:PORT = "${{ inputs.port }}"
        $proc = Start-Process -FilePath $llemulatorExe `
          -WorkingDirectory $llemulatorDir `
          -PassThru `
          -NoNewWindow `
          -RedirectStandardOutput "$Env:RUNNER_TEMP\llemulator-stdout.log" `
          -RedirectStandardError  "$Env:RUNNER_TEMP\llemulator-stderr.log"

        Write-Host "Llemulator started (PID $($proc.Id))"

        $LLEMULATOR_URL = "http://localhost:${{ inputs.port }}/v1"
        echo "LLEMULATOR_URL=$LLEMULATOR_URL" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

        Write-Host "Llemulator URL: $LLEMULATOR_URL"

    - name: Wait for llemulator to be ready (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "=== Waiting for llemulator to be ready ==="
        for i in {1..30}; do
          if curl -s http://localhost:${{ inputs.port }}/healthz > /dev/null 2>&1; then
            echo "Llemulator is ready"
            break
          fi
          echo "Waiting for llemulator... ($i/30)"
          sleep 2
        done

        # Verify it's responding
        if ! curl -s http://localhost:${{ inputs.port }}/healthz > /dev/null 2>&1; then
          echo "ERROR: Llemulator failed to start. Logs:"
          cat "$RUNNER_TEMP/llemulator-stdout.log" 2>/dev/null || true
          cat "$RUNNER_TEMP/llemulator-stderr.log" 2>/dev/null || true
          exit 1
        fi

    # ── Shared: expose the URL as a step output (consumed by the action outputs) ─
    - name: Set llemulator output URL
      id: set_llemulator_output
      shell: bash
      run: |
        echo "url=${LLEMULATOR_URL}" >> $GITHUB_OUTPUT

    # ── Shared: configure and verify llemulator (works on both platforms) ───
    - name: Configure llemulator with test responses
      shell: bash
      run: |
        echo "=== Configuring llemulator with test responses ==="

        # Configure llemulator with 5 test responses
        response=$(curl -s -X POST http://localhost:${{ inputs.port }}/_emulator/script \
          -H "Authorization: Bearer dummy-key-for-llemulator" \
          -H "Content-Type: application/json" \
          -d '{
            "reset": true,
            "models": ["gpt-4o", "gpt-4", "gpt-3.5-turbo"],
            "responses": [
              "LLEMULATOR response 1",
              "LLEMULATOR response 2",
              "LLEMULATOR response 3",
              "LLEMULATOR response 4",
              "LLEMULATOR response 5"
            ]
          }')

        if [ $? -ne 0 ]; then
          echo "ERROR: Failed to configure llemulator"
          echo "Response: $response"
          exit 1
        fi

        echo "Successfully configured llemulator with test responses"
        echo "Response: $response"

    - name: Verify llemulator is working
      shell: bash
      run: |
        echo "=== Testing llemulator endpoint ==="
        RESPONSE=$(curl -s -X POST http://localhost:${{ inputs.port }}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer dummy-key-for-llemulator" \
          -d '{
            "model": "gpt-4o",
            "messages": [{"role": "user", "content": "test"}]
          }')

        echo "Test response: $RESPONSE"

        if echo "$RESPONSE" | grep -q "LLEMULATOR response"; then
          echo "Llemulator is returning configured responses"
        else
          echo "WARNING: Response did not contain expected test string"
        fi
